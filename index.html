<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marine Exam App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Marine Exam Trainer</h1>

        <div class="card">

            <label>Select Subject</label>

            <select id="subject">
                <option value="A_II_1_OOW_on_ships_500GT_or_more_–_F1_NAVIGATION_OPERATIONAL_LEVEL.json">OOW on ships 500GT F1</option>
                <option value="A_II_1_OOW_on_ships_500GT_or_more_–_F3_Control_ENG_0_2.json">OOW on ships 500GT F3</option>
                <option value="A_II_2_Masters_and_Chief_mates_on_ships_over_500_GT_F1_NAVIGATION.json">Masters and Chief mates</option>
                <option value="A-II-1-OOW - 500GT or more - F2-Cargo ENG_0 3.json">OOW on ships 500GT F2</option>
            </select>

            <label>Select Mode</label>

            <select id="mode">
                <option value="45">Random 45 Questions</option>
                <option value="all">Full Exam</option>
            </select>

            <button onclick="startQuiz()">
                Start Quiz
            </button>

        </div>

    </div>

    <script>
        function startQuiz() {

            const subject =
                document.getElementById("subject").value;

            const mode =
                document.getElementById("mode").value;

            window.location.href =
                `quiz.html?subject=${subject}&mode=${mode}`;
        }
    </script>

</body>
</html>
